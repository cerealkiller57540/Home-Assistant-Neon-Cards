            color: currentColor; vertical-align: middle; }
  ha-icon::before { font-family: "Material Design Icons";

/* ───────────────────────────────────────────────────────────
   Stub <ha-icon> : convertit l'attribut icon="mdi:xxx" en glyphe MDI.
   ─────────────────────────────────────────────────────────── */
const ICON_STUBS = new Set();
class HaIconStub extends HTMLElement {
  static get observedAttributes() { return ['icon']; }
  attributeChangedCallback() { this._upd(); }
  connectedCallback() { ICON_STUBS.add(this); this._upd(); }
  set icon(v) { this.setAttribute('icon', v); }
  get icon() { return this.getAttribute('icon'); }
  _upd() {
    const name = (this.getAttribute('icon') || '').replace('mdi:', '');
    if (!name) return;
    // Mappe le nom MDI vers son glyphe via une classe MDI cachée mesurée
    const probe = document.createElement('i');
    probe.className = 'mdi mdi-' + name;
    probe.style.cssText = 'position:absolute;visibility:hidden';
    document.body.appendChild(probe);
    const glyph = getComputedStyle(probe, '::before').content.replace(/"/g, '');
    probe.remove();
    if (glyph && glyph !== 'none') {
      this.setAttribute('data-icon-glyph', glyph);
      // Rendu DIRECT du glyphe (le ::before du document ne traverse pas le shadow DOM
      // de la card → on pose le caractère + la police MDI en style inline sur l'élément).
      this.textContent = glyph;
      this.style.fontFamily = '"Material Design Icons"';
      this.style.fontSize = 'var(--mdc-icon-size, 24px)';
      this.style.lineHeight = '1';
      this.style.fontStyle = 'normal';
    } else if (!this._retried) {
      // Police MDI pas encore prête → réessaie une fois qu'elle est chargée
      this._retried = true;
      (document.fonts ? document.fonts.ready : Promise.resolve())
        .then(() => requestAnimationFrame(() => { this._retried = false; this._upd(); }));
    }
  }
}
if (!customElements.get('ha-icon')) customElements.define('ha-icon', HaIconStub);
// Re-scan global quand la police MDI est chargée (les icônes posées avant sont rafraîchies)
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => ICON_STUBS.forEach(i => i._upd()));
}
// La police MDI peut charger après les icônes → ré-évaluer une fois prête.
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => { ICON_STUBS.forEach((i) => i._upd()); });
}
document.addEventListener('DOMContentLoaded', () =>
  setTimeout(() => ICON_STUBS.forEach((i) => i._upd()), 600));

/* Charge un script classique (les cards font customElements.define, pas d'export). */
function loadScript(src) {
  return new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve(true);
    s.onerror = () => { console.warn('script KO', src); resolve(false); };
    document.head.appendChild(s);
  });
}

/* Charge séquentiellement chaque .js puis instancie la card. */
const grid = document.getElementById('grid');
async function load(card) {
  await loadScript(card.file);
  await Promise.race([
    customElements.whenDefined(card.tag),
    new Promise(r => setTimeout(r, 1500)),
  ]).catch(() => {});
  const tile = document.createElement('div'); tile.className = 'tile';
  const lab = document.createElement('p'); lab.className = 'label'; lab.textContent = card.label;
  tile.appendChild(lab);
  try {
    const el = document.createElement(card.tag);
    el.setConfig(card.config);
    el.hass = HASS;
    tile.appendChild(el);
  } catch (e) {
    const err = document.createElement('pre');
    err.style.cssText = 'color:#ff6b8a;font-size:11px;white-space:pre-wrap';
    err.textContent = card.label + ' : ' + (e && e.message || e);
    tile.appendChild(err);
    console.error(card.label, e);
  }
  grid.appendChild(tile);
}
// ?card=<tag> → n'affiche que cette card (évite les collisions de globals entre cards).
// ?gallery=1 → fond image Neo Tokyo v3 (aperçu du thème).
const params = new URLSearchParams(location.search);
const only = params.get('card');
if (params.get('gallery')) document.body.classList.add('gallery');
const list = only ? CARDS.filter(c => c.tag === only) : CARDS;
(async () => {
  for (const c of list) await load(c);
  document.body.dataset.ready = '1';
})();
